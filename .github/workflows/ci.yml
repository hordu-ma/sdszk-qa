name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: luyun_sizheng
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d luyun_sizheng"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install backend dependencies
        run: make setup-backend

      - name: Ruff
        run: uv run ruff check .

      - name: Basedpyright
        run: uv run basedpyright

      - name: Unit tests
        run: make test-unit

      - name: Integration tests
        run: make test-integration

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/apps/web/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build
