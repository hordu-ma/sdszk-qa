services:
  postgres:
    image: pgvector/pgvector:pg17-trixie@sha256:4cef73a5d4bac06038cc930190f787a353b4f3513c076d8b6a99a70f13ba6f9f
    restart: unless-stopped
    network_mode: host
    command: ["postgres", "-c", "listen_addresses=127.0.0.1", "-p", "${POSTGRES_PORT:-25432}"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-luyun}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-luyun_sizheng}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p ${POSTGRES_PORT:-25432} -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    restart: unless-stopped
    network_mode: host
    command: server /data --address "127.0.0.1:${MINIO_PORT:-29000}" --console-address "127.0.0.1:${MINIO_CONSOLE_PORT:-29001}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-luyun}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'MC_HOST_health="http://$${MINIO_ROOT_USER}:$${MINIO_ROOT_PASSWORD}@127.0.0.1:${MINIO_PORT:-29000}" mc ready health'
      interval: 5s
      timeout: 3s
      retries: 20

  vllm-generation:
    profiles: ["model-baseline"]
    image: vllm/vllm-openai:v0.18.0@sha256:c32358ebfc115d56ade2acfdbcd00df5b115417dbd6006547c88f07e2b39de06
    restart: unless-stopped
    runtime: nvidia
    ipc: host
    network_mode: host
    command:
      - Qwen/Qwen2.5-0.5B-Instruct
      - --revision
      - 7ae557604adf67be50417f59c2c2f167def9a775
      - --served-model-name
      - teaching-chat-engineering
      - --host
      - 127.0.0.1
      - --port
      - "${VLLM_GENERATION_PORT:-28001}"
      - --max-model-len
      - "4096"
      - --gpu-memory-utilization
      - "0.20"
    volumes:
      - vllm_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${VLLM_GENERATION_PORT:-28001}/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 40

  vllm-embedding:
    profiles: ["semantic-rag"]
    image: vllm/vllm-openai:v0.18.0@sha256:c32358ebfc115d56ade2acfdbcd00df5b115417dbd6006547c88f07e2b39de06
    restart: unless-stopped
    runtime: nvidia
    ipc: host
    network_mode: host
    command:
      - BAAI/bge-small-zh-v1.5
      - --revision
      - 7999e1d3359715c523056ef9478215996d62a620
      - --served-model-name
      - teaching-embedding
      - --runner
      - pooling
      - --host
      - 127.0.0.1
      - --port
      - "${VLLM_EMBEDDING_PORT:-28002}"
      - --gpu-memory-utilization
      - "0.10"
    volumes:
      - vllm_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${VLLM_EMBEDDING_PORT:-28002}/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 40

  vllm-reranker:
    profiles: ["semantic-rag"]
    image: vllm/vllm-openai:v0.18.0@sha256:c32358ebfc115d56ade2acfdbcd00df5b115417dbd6006547c88f07e2b39de06
    restart: unless-stopped
    runtime: nvidia
    ipc: host
    network_mode: host
    command:
      - BAAI/bge-reranker-v2-m3
      - --revision
      - 953dc6f6f85a1b2dbfca4c34a2796e7dde08d41e
      - --served-model-name
      - teaching-reranker
      - --runner
      - pooling
      - --host
      - 127.0.0.1
      - --port
      - "${VLLM_RERANKER_PORT:-28003}"
      - --gpu-memory-utilization
      - "0.15"
    volumes:
      - vllm_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${VLLM_RERANKER_PORT:-28003}/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 40

  api:
    image: luyun-sizheng-api:${RELEASE_TAG:-stage1a}
    build:
      context: ../../..
      dockerfile: src/apps/api/Dockerfile
    restart: unless-stopped
    network_mode: host
    command: ["uv", "run", "uvicorn", "src.apps.api.main:app", "--host", "127.0.0.1", "--port", "${API_PORT:-28000}"]
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-luyun}:${POSTGRES_PASSWORD}@127.0.0.1:${POSTGRES_PORT:-25432}/${POSTGRES_DB:-luyun_sizheng}
      MINIO_ENDPOINT: 127.0.0.1:${MINIO_PORT:-29000}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-luyun}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-luyun-sizheng-int}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://127.0.0.1:${VLLM_GENERATION_PORT:-28001}}
      LLM_MODEL: ${LLM_MODEL:-teaching-chat-engineering}
      LLM_PROVIDER: ${LLM_PROVIDER:-vllm}
      LLM_LOGICAL_MODEL: ${LLM_LOGICAL_MODEL:-teaching-chat}
      LLM_TIMEOUT: ${LLM_TIMEOUT:-180}
      LLM_MAX_CONTEXT_LEN: ${LLM_MAX_CONTEXT_LEN:-4096}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1000}
      APP_RELEASE: ${RELEASE_TAG:-stage1}
      CONTENT_MODE: ${CONTENT_MODE:-synthetic}
      CONTENT_DISCLAIMER: ${CONTENT_DISCLAIMER:-模拟数据，仅用于工程验证；不得作为专业验收结论。}
      VLLM_RUNTIME_VERSION: "0.18.0"
      VLLM_RUNTIME_IMAGE: vllm/vllm-openai:v0.18.0@sha256:c32358ebfc115d56ade2acfdbcd00df5b115417dbd6006547c88f07e2b39de06
      SEMANTIC_RAG_ENABLED: ${SEMANTIC_RAG_ENABLED:-false}
      EMBEDDING_BASE_URL: http://127.0.0.1:${VLLM_EMBEDDING_PORT:-28002}
      EMBEDDING_MODEL: BAAI/bge-small-zh-v1.5
      EMBEDDING_REVISION: 7999e1d3359715c523056ef9478215996d62a620
      EMBEDDING_SERVED_NAME: teaching-embedding
      EMBEDDING_DIMENSIONS: 512
      EMBEDDING_MAX_TOKENS: 512
      RERANKER_BASE_URL: http://127.0.0.1:${VLLM_RERANKER_PORT:-28003}
      RERANKER_MODEL: BAAI/bge-reranker-v2-m3
      RERANKER_REVISION: 953dc6f6f85a1b2dbfca4c34a2796e7dde08d41e
      RERANKER_SERVED_NAME: teaching-reranker
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DEMO_PASSWORD: ${DEMO_PASSWORD:?DEMO_PASSWORD is required}
      DEMO_ADMIN_USERNAME: ${DEMO_ADMIN_USERNAME:-demo_admin}
      DEMO_ADMIN_FULL_NAME: ${DEMO_ADMIN_FULL_NAME:-鲁韵验证管理员}
      DEMO_TEACHER_USERNAME: ${DEMO_TEACHER_USERNAME:-demo_teacher}
      DEMO_TEACHER_FULL_NAME: ${DEMO_TEACHER_FULL_NAME:-鲁韵验证教师}
      ENV: production
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-["https://base-spark.tail84088a.ts.net"]}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:${API_PORT:-28000}/health', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 20

  web:
    image: luyun-sizheng-web:${RELEASE_TAG:-stage1a}
    build:
      context: ../../..
      dockerfile: src/apps/web/Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      WEB_PORT: ${WEB_PORT:-8088}
      API_PORT: ${API_PORT:-28000}
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
  vllm_cache:
