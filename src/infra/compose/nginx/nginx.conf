# A 服务器共享 Nginx 场景专用：
# - A 服务器：172.18.6.117（现网 Nginx，不可独占）
# - B 服务器：172.18.6.123（API:8000）
#
# 用法：将以下 location 片段并入现有 server {}（不要替换主 nginx.conf）。

location / {
    root /data/www/luyun-sizheng/dist;
    try_files $uri $uri/ /index.html;
}

location /api/ {
    proxy_pass http://172.18.6.123:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /api/chat {
    proxy_pass http://172.18.6.123:8000;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Connection '';
    proxy_http_version 1.1;
    chunked_transfer_encoding off;
}

location ^~ /api/chat/ {
    proxy_pass http://172.18.6.123:8000;
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Connection '';
    proxy_http_version 1.1;
    chunked_transfer_encoding off;
}
